spring.application.name=www

server.port=8090

# RDB \uC911 \uC5F0\uACB0\uD560 DB \uC5D4\uC9C4\uC5D0 \uB300\uD55C \uB4DC\uB77C\uC774\uBE0C \uC124\uC815
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# DB\uAC00 \uAD6C\uB3D9\uB418\uB294 IP (\uC8FC\uC18C)
spring.datasource.url=jdbc:mysql://localhost:3306/db1?useSSL=false&useUnicode=true&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
# \uC811\uC18D \uC544\uC774\uB514/\uBE44\uBC00\uBC88\uD638
spring.datasource.username=root
spring.datasource.password=root


# \uC790\uBC14 \uD074\uB798\uC2A4 \uAE30\uBC18\uC73C\uB85C MySQL \uD14C\uC774\uBE14 \uC790\uB3D9 \uC0DD\uC131 \uC5EC\uBD80 (update : \uC2A4\uD504\uB9C1 \uAE30\uBC18\uC73C\uB85C MySQL \uD14C\uC774\uBE14 \uC5C5\uB370\uC774\uD2B8)
spring.jpa.hibernate.ddl-auto=update
# \uC2A4\uD504\uB9C1 Entity\uC640 MySQL \uD14C\uC774\uBE14 \uD544\uB4DC\uAC04 \uD544\uB4DC\uBA85 \uC791\uBA85 \uC804\uB7B5
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl